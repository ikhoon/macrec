name: CI

# Build the Swift app and smoke-test the CLI on every push / PR that touches code.
# (No signing here — that only happens in release.yml on a tag.)

on:
  push:
    branches: [main]
    paths: ["macrec.swift", "Sources/**/*.swift", "**/*.sh", "**/*.md", ".markdownlint-cli2.jsonc", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["macrec.swift", "Sources/**/*.swift", "**/*.sh", "**/*.md", ".markdownlint-cli2.jsonc", ".github/workflows/ci.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26   # needs the macOS 26 SDK to compile the SpeechAnalyzer (live-captions) code
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version && sw_vers

      # install.sh/package.sh compute the .app version via version.sh; CI compiles with a DIFFERENT,
      # direct swiftc call, so a packaging-only break (like #88 moving `let macrecVersion` out of
      # macrec.swift) compiled + selftested green here yet broke every real install. Run the shared
      # parser so that class of break fails CI instead of a user's `./install.sh`.
      - name: Guard — install.sh/package.sh can resolve the app version
        run: |
          v=$(./version.sh) || { echo "::error::version.sh failed — install.sh/package.sh version parse is broken"; exit 1; }
          echo "✅ version resolves to $v (shared by install.sh, package.sh, and this job)"

      - name: Install speexdsp (AEC — statically linked into the binary)
        run: brew install speexdsp

      - name: Build (swiftc — same frameworks/libs as install.sh, unsigned)
        run: |
          SPEEX_PREFIX="$(brew --prefix speexdsp)"
          swiftc -swift-version 5 -parse-as-library -O \
            -framework AVFoundation -framework CoreMedia -framework CoreAudio \
            -framework CoreGraphics -framework AppKit -framework EventKit -framework ServiceManagement -framework Speech -framework Translation \
            -import-objc-header speex-bridge.h -I "$SPEEX_PREFIX/include" "$SPEEX_PREFIX/lib/libspeexdsp.a" \
            macrec.swift $(find Sources -name '*.swift') -o "$RUNNER_TEMP/macrec"

      - name: Guard — no ScreenCaptureKit + speexdsp is statically linked
        run: |
          if otool -L "$RUNNER_TEMP/macrec" | grep -qi ScreenCaptureKit; then
            echo "::error::binary links ScreenCaptureKit — system audio must use the Core Audio tap"; exit 1
          fi
          if otool -L "$RUNNER_TEMP/macrec" | grep -qi speexdsp; then
            echo "::error::binary links libspeexdsp dynamically — must be static so the .app is self-contained"; exit 1
          fi
          echo "✅ no ScreenCaptureKit; speexdsp statically linked"

      - name: Smoke-test CLI (headless, no GUI / permissions)
        run: |
          "$RUNNER_TEMP/macrec" config          # must print resolved settings + exit 0
          "$RUNNER_TEMP/macrec" perm-status || true   # exits non-zero when ungranted (expected on CI)

      - name: Unit self-tests (pure logic — locale mapping, speaker labels)
        run: |
          "$RUNNER_TEMP/macrec" selftest

  # Lint the docs (VISION/ARCHITECTURE/README/…) with the same markdownlint-cli2 config the
  # maintainer runs locally, so a structural regression (missing blank line around a heading/list/
  # fence) fails the PR instead of accumulating. Ubuntu + pinned version = fast and reproducible.
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint Markdown (.markdownlint-cli2.jsonc)
        run: npx --yes markdownlint-cli2@0.23.0
