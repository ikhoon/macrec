# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit config for macrec. Reviews are English (this is a public repo — no internal identifiers).
# Install the GitHub App once at https://github.com/apps/coderabbitai for these to take effect.
language: "en-US"

reviews:
  profile: "assertive"            # this project's bar is high — surface more, not fewer, issues
  request_changes_workflow: false
  high_level_summary: false       # skip the "Summary by CodeRabbit" walkthrough — the maintainer finds it noise
  review_status: true
  poem: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
  # Skip generated / vendored / binary artifacts.
  path_filters:
    - "!dist/**"
    - "!.build/**"
    - "!**/AppIcon.iconset/**"
    - "!**/*.icns"
    - "!**/*.png"
  path_instructions:
    - path: "**/*.swift"
      instructions: >-
        Single-module Swift, built via `swiftc macrec.swift Sources/*.swift` (no SwiftPM). Flag any
        new pure decision/function that lacks a selftest case in Sources/Selftest.swift reproducing
        the real failure (exact inputs, not a proxy). Comments must be English and sparse — one line,
        only for a non-obvious WHY; flag comment prose that restates the code or records provenance.
        Prefer one pure, testable decision function over logic duplicated across call sites (enablement
        and action should derive from the same source). For AppKit, assert framework-owned properties
        after the framework's own update pass, not right after assigning them. Watch for state cached
        once at construction and then trusted (stale snapshots) — the invalidating event must be named.
    - path: "**/*.sh"
      instructions: >-
        Build/release scripts (zsh). The app version has ONE source of truth (version.sh); never
        reintroduce an inline, file-specific grep for `macrecVersion`. Never hardcode org/employer
        identifiers, hostnames, or ticket IDs in any script, fixture, or placeholder.

chat:
  auto_reply: true
